name: bytomanager-smart-property

services:
  traefik:
    image: traefik:v3.1
    container_name: bytomanager-traefik
    restart: always
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=bytomanager-smart-property_traefik-network
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --api.dashboard=false
      - --certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - traefik-network

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: https://${TRAEFIK_DOMAIN}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    container_name: bytomanager-frontend
    restart: always
    depends_on:
      - backend
    networks:
      - traefik-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=bytomanager-smart-property_traefik-network
      - traefik.http.routers.bytomanager-frontend.rule=Host(`${TRAEFIK_DOMAIN}`)
      - traefik.http.routers.bytomanager-frontend.entrypoints=websecure
      - traefik.http.routers.bytomanager-frontend.tls.certresolver=letsencrypt
      - traefik.http.routers.bytomanager-frontend.priority=1
      - traefik.http.services.bytomanager-frontend.loadbalancer.server.port=80

  backend:
    build:
      context: ./backend
    container_name: bytomanager-backend
    restart: always
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: ${PORT:-5000}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.3}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-800}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS:-30000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-}
      OPENAI_MAX_TOKENS: ${OPENAI_MAX_TOKENS:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - traefik-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=bytomanager-smart-property_traefik-network
      - traefik.http.routers.bytomanager-backend.rule=Host(`${TRAEFIK_DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.bytomanager-backend.entrypoints=websecure
      - traefik.http.routers.bytomanager-backend.tls.certresolver=letsencrypt
      - traefik.http.routers.bytomanager-backend.priority=100
      - traefik.http.services.bytomanager-backend.loadbalancer.server.port=${PORT:-5000}

networks:
  traefik-network:
    name: bytomanager-smart-property_traefik-network

volumes:
  letsencrypt:
